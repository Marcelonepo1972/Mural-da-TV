<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mural da Equipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1118; --bg2:#0a0b10;
  --accent:#FF6A1A; --accent2:#ff9248;
  --txt:#f5f2ea; --txt2:#aeb3c2; --txt3:#727789;
  --line:rgba(255,255,255,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.stage{position:relative;height:100vh;width:100vw;background:
  radial-gradient(1000px 800px at 70% 40%, rgba(255,106,26,.14), transparent 60%),
  linear-gradient(150deg,#13151e 0%, #090a0e 75%);overflow:hidden}
.stage::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.045;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}

/* foto sangrando à direita */
.photo{position:absolute;top:0;bottom:0;right:0;width:57%;z-index:1}
.photo img{width:100%;height:100%;object-fit:cover;object-position:center 36%;display:block}
.photo .ini{width:100%;height:100%;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:22vw;color:rgba(255,255,255,.9)}
.photo .blend{position:absolute;inset:0;background:
  linear-gradient(90deg, var(--bg) 1%, rgba(15,17,24,.72) 20%, rgba(15,17,24,0) 52%),
  linear-gradient(0deg, rgba(10,11,16,.55), transparent 26%, rgba(10,11,16,.45))}

/* topo */
.top{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;justify-content:space-between;align-items:center;padding:3vh 3.4vw}
.brand{display:flex;align-items:center;gap:.7vw}
.logo{width:2.5vw;min-width:32px;height:2.5vw;min-height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#c24700);
  display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;color:#fff;font-size:1.35vw;box-shadow:0 6px 22px rgba(255,106,26,.4)}
.brand b{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.4vw;letter-spacing:.2px}
.fs{cursor:pointer;color:var(--txt3);background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:8px;padding:.7vh 1vw;font-size:.95vw;font-family:inherit;backdrop-filter:blur(4px)}
.fs:hover{color:var(--txt)}

/* conteúdo à esquerda */
.content{position:absolute;left:0;top:0;bottom:0;width:55%;z-index:4;display:flex;flex-direction:column;justify-content:center;padding:0 3vw 0 4vw}
.kicker{font-size:1.05vw;letter-spacing:.34em;text-transform:uppercase;color:var(--txt2);font-weight:600;margin-bottom:1.8vh}
.nome{font-family:'Bricolage Grotesque';font-weight:800;font-size:5.4vw;line-height:.95;letter-spacing:-.02em;color:var(--accent);margin-bottom:1.6vh;text-shadow:0 2px 30px rgba(255,106,26,.25)}
.cargo{font-size:2vw;font-weight:600;color:var(--txt);margin-bottom:3.4vh;padding-bottom:1vh;border-bottom:3px solid rgba(255,106,26,.55);display:inline-block;width:fit-content}
.atrib-h{font-size:1vw;letter-spacing:.22em;text-transform:uppercase;color:var(--txt3);font-weight:600;margin-bottom:1.8vh}
.atrib{list-style:none;display:flex;flex-direction:column;gap:1.5vh;margin-bottom:3.6vh}
.atrib li{display:flex;gap:1.1vw;align-items:flex-start;font-size:1.5vw;line-height:1.3;color:#e7e4dc;max-width:42vw}
.atrib li i{flex:none;width:.85vw;height:.85vw;margin-top:.5vh;border-radius:3px;background:var(--accent);box-shadow:0 0 12px rgba(255,106,26,.6)}
.areachip{align-self:flex-start;background:linear-gradient(135deg,var(--accent),#d4530c);color:#fff;font-weight:700;
  font-size:1.15vw;padding:1.4vh 1.8vw;border-radius:12px;box-shadow:0 12px 30px rgba(255,106,26,.35);letter-spacing:.02em}

/* animação */
.content .reveal{opacity:0;transform:translateY(26px)}
.content.show .reveal{opacity:1;transform:none;transition:opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1);transition-delay:var(--d,0s)}
.content.leave .reveal{opacity:0;transition:opacity .4s ease}
.photo{transition:opacity .8s ease, transform 1s cubic-bezier(.2,.7,.2,1)}
.photo.enter{opacity:0;transform:scale(1.05)}
.photo.leave{opacity:0}

/* rodapé */
.bottom{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:0 3.4vw 2.4vh}
.track{height:5px;width:100%;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px}
.fill.run{animation:prog linear forwards}
@keyframes prog{from{width:0}to{width:100%}}
.meta{display:flex;justify-content:space-between;align-items:center;margin-top:1.5vh}
.dots{display:flex;gap:.7vw}
.dots b{width:.7vw;height:.7vw;min-width:7px;min-height:7px;border-radius:50%;background:rgba(255,255,255,.2);transition:.4s}
.dots b.on{background:var(--accent);width:2.2vw;border-radius:6px}
.count{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.25vw;color:var(--txt2)}
.count em{color:var(--accent);font-style:normal}
.hint{position:absolute;bottom:.7vh;left:50%;transform:translateX(-50%);color:var(--txt3);font-size:.8vw;opacity:.45;z-index:6}

@media(max-width:760px){
  .photo{width:100%;height:48%}
  .photo .blend{background:linear-gradient(0deg, var(--bg) 8%, rgba(15,17,24,.4) 40%, transparent 70%)}
  .content{width:100%;top:auto;bottom:0;height:56%;justify-content:flex-start;padding:3vh 7vw}
  .nome{font-size:10vw}.cargo{font-size:5vw}.kicker{font-size:3vw}.atrib li{font-size:3.6vw;max-width:none}
  .atrib-h{font-size:3vw}.areachip{font-size:3.4vw;padding:1.4vh 5vw}
}
</style>
</head>
<body>
<div class="stage">
  <div class="photo enter" id="photo"></div>

  <div class="top">
    <div class="brand"><div class="logo" id="logo">O</div><b id="empresa">Oba Hortifruti</b></div>
    <button class="fs" onclick="toggleFs()">⛶ Tela cheia</button>
  </div>

  <div class="content enter" id="content">
    <div class="kicker reveal" id="kicker" style="--d:.05s">Equipe</div>
    <h1 class="nome reveal" id="nome" style="--d:.13s">Nome</h1>
    <div class="cargo reveal" id="cargo" style="--d:.21s">Cargo</div>
    <div class="atrib-h reveal" style="--d:.29s">Atribuições</div>
    <ul class="atrib reveal" id="atrib" style="--d:.37s"></ul>
    <div class="areachip reveal" id="chip" style="--d:.45s">Área</div>
  </div>

  <div class="bottom">
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="meta">
      <div class="dots" id="dots"></div>
      <div class="count"><em id="cAtual">01</em> / <span id="cTotal">07</span></div>
    </div>
  </div>
  <div class="hint">← → troca manual · barra de espaço pausa</div>
</div>

/* ===================================================== */

document.getElementById('empresa').textContent = EMPRESA;
document.getElementById('logo').textContent = (EMPRESA.trim()[0]||'O').toUpperCase();
document.getElementById('cTotal').textContent = String(equipe.length).padStart(2,'0');

const photo=document.getElementById('photo'), content=document.getElementById('content'), fill=document.getElementById('fill');
let idx=0, paused=false;
const palettes=[['#FF6A1A','#b94600'],['#2E7DFF','#0b3aa0'],['#26B873','#0b6b3f'],['#9B5CFF','#5a2bb0'],['#FF4D6D','#a01030']];
function ini(n){return n.trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase()}
function setPhoto(m){
  if(m.foto){
    photo.innerHTML=`<img src="${m.foto}" alt="${m.nome}" onerror="this.parentNode.innerHTML='<div class=\\'ini\\' style=\\'background:linear-gradient(140deg,#FF6A1A,#7a2c00)\\'>${ini(m.nome)}</div>'"><div class="blend"></div>`;
  } else {
    const p=palettes[m.nome.length%palettes.length];
    photo.innerHTML=`<div class="ini" style="background:linear-gradient(140deg,${p[0]},${p[1]})">${ini(m.nome)}</div><div class="blend"></div>`;
  }
}
function dots(){
  document.getElementById('dots').innerHTML=equipe.map((_,i)=>`<b class="${i===idx?'on':''}"></b>`).join('');
  document.getElementById('cAtual').textContent=String(idx+1).padStart(2,'0');
}
function render(){
  const m=equipe[idx];
  setPhoto(m);
  document.getElementById('kicker').textContent=(m.area||'Equipe');
  document.getElementById('nome').textContent=m.nome;
  document.getElementById('cargo').textContent=m.cargo;
  document.getElementById('chip').textContent=m.area||'';
  document.getElementById('atrib').innerHTML=(cargos[m.cargo]||[]).map(a=>`<li><i></i><span>${a}</span></li>`).join('');
  dots();
}
function startProgress(){
  fill.classList.remove('run'); fill.style.width='0'; void fill.offsetWidth;
  fill.style.animationDuration=SEGUNDOS+'s'; if(!paused) fill.classList.add('run');
}
function show(){
  content.classList.remove('leave'); content.classList.add('enter'); photo.classList.add('enter');
  render(); void content.offsetWidth;
  content.classList.remove('enter'); content.classList.add('show'); photo.classList.remove('enter');
  startProgress();
}
function go(n){
  content.classList.add('leave'); photo.classList.add('leave');
  setTimeout(()=>{ content.classList.remove('show'); photo.classList.remove('leave'); idx=(n+equipe.length)%equipe.length; show(); },430);
}
fill.addEventListener('animationend',()=>{ if(!paused) go(idx+1); });
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') go(idx+1);
  else if(e.key==='ArrowLeft') go(idx-1);
  else if(e.key===' '){ e.preventDefault(); paused=!paused; if(paused) fill.classList.remove('run'); else startProgress(); }
});
function toggleFs(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); }
show();
</script>
